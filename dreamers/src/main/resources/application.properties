    spring.application.name=dreamers
    # Server Configuration
    server.port=8080
    server.address=localhost

    # Database Connection Configuration
    spring.datasource.url=jdbc:mysql://localhost:3306/mynew
    spring.datasource.username=root
    spring.datasource.password=4768
    spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

    # Hibernate Configuration for JPA
    # 'update' will create/alter tables based on your entities (Product, Category)
    spring.jpa.hibernate.ddl-auto=update
    # Shows the SQL statements generated by Hibernate in the console
    spring.jpa.show-sql=true
    # Formats the SQL to make it more readable
    spring.jpa.properties.hibernate.format_sql=true
    ## The SQL dialect tells Hibernate how to talk to your specific database
    #spring.jpa.database-platform=org.hibernate.dialect.

    api.prefix = /api/v1




